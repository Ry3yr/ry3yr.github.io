<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dailymotion User Video Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .search-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .search-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }

        .search-btn:hover {
            transform: translateY(-2px);
        }

        .search-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .results-count {
            background: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            color: #667eea;
        }

        .loading {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 15px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .video-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .video-thumbnail {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #f5f5f5;
        }

        .video-info {
            padding: 15px;
        }

        .video-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            line-height: 1.4;
        }

        .video-meta {
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
        }

        .video-link {
            display: inline-block;
            background: #667eea;
            color: white;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            transition: background 0.2s;
        }

        .video-link:hover {
            background: #764ba2;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #c33;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 15px;
            color: #666;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .video-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 Dailymotion Video Search</h1>
            <p class="subtitle">Search videos from any user with optional keyword filtering</p>
        </div>

        <div class="search-card">
            <div class="input-group">
                <label>👤 Username *</label>
                <input type="text" id="username" placeholder="e.g., ShirleyHolmes" value="ShirleyHolmes">
            </div>
            <div class="input-group">
                <label>🔍 Keyword (optional)</label>
                <input type="text" id="keyword" placeholder="Filter videos by keyword in title...">
            </div>
            <button class="search-btn" onclick="searchVideos()">Search Videos</button>
        </div>

        <div id="results"></div>
    </div>

    <script>
        // Function to get user ID from username
        async function getUserId(username) {
            try {
                const response = await fetch(`https://api.dailymotion.com/user/${username}?fields=id`);
                if (!response.ok) {
                    throw new Error('User not found');
                }
                const data = await response.json();
                return data.id;
            } catch (error) {
                throw new Error(`Could not find user: ${username}`);
            }
        }

        // Function to get videos from user ID
        async function getUserVideos(userId, page = 1, limit = 100) {
            try {
                const response = await fetch(
                    `https://api.dailymotion.com/user/${userId}/videos?fields=id,title,thumbnail_240_url,created_time,duration&page=${page}&limit=${limit}&sort=recent`
                );
                if (!response.ok) {
                    throw new Error('Failed to fetch videos');
                }
                const data = await response.json();
                return data;
            } catch (error) {
                throw error;
            }
        }

        // Function to get all videos (handles pagination)
        async function getAllVideos(userId, maxVideos = 500) {
            let allVideos = [];
            let page = 1;
            let hasMore = true;

            while (hasMore && allVideos.length < maxVideos) {
                try {
                    const response = await getUserVideos(userId, page, 100);
                    if (response.list && response.list.length > 0) {
                        allVideos = [...allVideos, ...response.list];
                        page++;
                        hasMore = response.has_more;
                    } else {
                        hasMore = false;
                    }
                } catch (error) {
                    throw error;
                }
            }

            return allVideos;
        }

        // Format duration from seconds to MM:SS
        function formatDuration(seconds) {
            if (!seconds) return 'N/A';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Format date
        function formatDate(timestamp) {
            if (!timestamp) return 'Unknown date';
            const date = new Date(timestamp * 1000);
            return date.toLocaleDateString();
        }

        // Display results
        function displayResults(videos, username, keyword) {
            const resultsDiv = document.getElementById('results');
            
            if (videos.length === 0) {
                resultsDiv.innerHTML = `
                    <div class="no-results">
                        <h3>😕 No videos found</h3>
                        <p>${keyword ? `No videos matching "${keyword}" found for user "${username}".` : `User "${username}" has no public videos.`}</p>
                    </div>
                `;
                return;
            }

            const videoCards = videos.map(video => `
                <div class="video-card">
                    <img class="video-thumbnail" src="${video.thumbnail_240_url || 'https://via.placeholder.com/320x180?text=No+Thumbnail'}" alt="${escapeHtml(video.title)}">
                    <div class="video-info">
                        <div class="video-title">${escapeHtml(video.title)}</div>
                        <div class="video-meta">
                            📅 ${formatDate(video.created_time)} • ⏱️ ${formatDuration(video.duration)}
                        </div>
                        <a class="video-link" href="https://www.dailymotion.com/video/${video.id}" target="_blank" rel="noopener noreferrer">
                            Watch Video →
                        </a>
                    </div>
                </div>
            `).join('');

            resultsDiv.innerHTML = `
                <div class="results-header">
                    <h2>📹 Search Results</h2>
                    <div class="results-count">${videos.length} video${videos.length !== 1 ? 's' : ''} found</div>
                </div>
                <div class="video-grid">
                    ${videoCards}
                </div>
            `;
        }

        // Helper function to escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Show loading state
        function showLoading() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Searching for videos...</p>
                </div>
            `;
        }

        // Show error
        function showError(message) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="error-message">
                    <strong>Error:</strong> ${escapeHtml(message)}
                </div>
            `;
        }

        // Main search function
        async function searchVideos() {
            const username = document.getElementById('username').value.trim();
            const keyword = document.getElementById('keyword').value.trim().toLowerCase();
            
            if (!username) {
                showError('Please enter a username');
                return;
            }

            const searchBtn = document.querySelector('.search-btn');
            searchBtn.disabled = true;
            searchBtn.textContent = 'Searching...';
            showLoading();

            try {
                // Step 1: Get user ID
                const userId = await getUserId(username);
                
                // Step 2: Get all videos
                const allVideos = await getAllVideos(userId);
                
                // Step 3: Filter by keyword if provided
                let filteredVideos = allVideos;
                if (keyword) {
                    filteredVideos = allVideos.filter(video => 
                        video.title && video.title.toLowerCase().includes(keyword)
                    );
                    
                    if (filteredVideos.length === 0) {
                        showError(`No videos found matching "${keyword}" for user "${username}". Total videos found: ${allVideos.length}`);
                        return;
                    }
                }
                
                // Step 4: Display results
                displayResults(filteredVideos, username, keyword);
                
            } catch (error) {
                console.error('Search error:', error);
                showError(error.message || 'An error occurred while searching. Please check the username and try again.');
            } finally {
                searchBtn.disabled = false;
                searchBtn.textContent = 'Search Videos';
            }
        }

        // Allow Enter key to trigger search
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = ['username', 'keyword'];
            inputs.forEach(id => {
                document.getElementById(id).addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        searchVideos();
                    }
                });
            });
        });
    </script>
</body>
</html>
